<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="style.css">
<body class="w-[1200px] h-[900px] bg-[#07090e] overflow-hidden flex flex-col p-6 select-none">
  
  <!-- Main Glass Panel Container -->
  <div class="glass-panel w-full h-full flex flex-col p-5 relative overflow-hidden">
    
    <!-- Background grid decoration -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,rgba(255,184,0,0.06),transparent_50%)] pointer-events-none"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom_left,rgba(236,72,153,0.06),transparent_50%)] pointer-events-none"></div>

    <!-- Header Section -->
    <div class="flex justify-between items-center mb-6 relative z-10">
      <div>
        <h1 class="text-4xl font-bold font-heading tracking-wider flex items-center gap-3">
          <i data-lucide="trophy" class="text-[#ffb800] w-10 h-10"></i>
          LEADERBOARD
        </h1>
        <p class="text-sm font-semibold tracking-wider text-slate-400 mt-1 uppercase" id="season-type">ALL TIME XP RANKINGS</p>
      </div>
      <div class="text-right">
        <h2 class="text-xl font-bold font-heading text-slate-200" id="server-name">SERVER NAME</h2>
        <p class="text-xs text-slate-400 mt-0.5" id="total-players">0 Total Players</p>
      </div>
    </div>

    <!-- Main Content Layout -->
    <div class="flex gap-6 flex-1 min-h-0 relative z-10">
      
      <!-- Left Side: User Standing Card -->
      <div class="w-[340px] flex flex-col gap-6">
        
        <!-- standing card -->
        <div class="flex-1 glass-panel bg-opacity-40 border-opacity-50 p-6 flex flex-col justify-between relative overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/30 pointer-events-none"></div>
          
          <div>
            <div class="flex items-center gap-3 mb-6">
              <i data-lucide="user" class="text-pink-500 w-6 h-6"></i>
              <span class="text-lg font-bold font-heading text-slate-200 tracking-wide uppercase">YOUR STANDING</span>
            </div>
            
            <div class="flex flex-col items-center text-center my-6">
              <!-- Avatar with border glow -->
              <div class="relative w-28 h-28 mb-4">
                <div class="absolute inset-0 rounded-full border-2 border-pink-500/30 animate-pulse"></div>
                <img id="caller-avatar" class="w-full h-full rounded-full object-cover border-2 border-pink-500 shadow-lg shadow-pink-500/20" src="" alt="Avatar">
                <div class="absolute -bottom-2 -right-2 bg-pink-500 text-white text-xs font-bold px-2 py-1 rounded font-mono shadow-md" id="caller-level-badge">LV 1</div>
              </div>
              
              <h3 class="text-xl font-bold font-heading text-slate-100 truncate w-full" id="caller-name">Username</h3>
              <p class="text-sm font-semibold text-slate-400 mt-1 uppercase" id="caller-path-name">Warrior Path</p>
            </div>
          </div>
          
          <!-- Caller standing details -->
          <div class="space-y-4">
            <div class="flex justify-between border-b border-white/5 pb-2 text-sm">
              <span class="text-slate-400">Server Rank</span>
              <span class="font-bold font-mono text-pink-500" id="caller-rank">#0</span>
            </div>
            <div class="flex justify-between border-b border-white/5 pb-2 text-sm">
              <span class="text-slate-400">Timeframe XP</span>
              <span class="font-bold font-mono text-slate-200" id="caller-score">0 XP</span>
            </div>
            
            <!-- XP Progress Bar -->
            <div class="space-y-1.5 pt-1">
              <div class="flex justify-between text-xs font-semibold">
                <span class="text-slate-400">Level Progress</span>
                <span class="text-slate-300 font-mono" id="caller-xp-pct">0%</span>
              </div>
              <div class="w-full bg-slate-800/80 rounded-full h-2 overflow-hidden border border-white/5">
                <div class="bg-pink-500 h-full rounded-full transition-all duration-500" id="caller-xp-bar" style="width: 0%"></div>
              </div>
              <div class="flex justify-between text-[10px] text-slate-500 font-mono">
                <span id="caller-current-xp">0</span>
                <span id="caller-next-xp">100</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Side: Leaderboard Table -->
      <div class="flex-1 flex flex-col glass-panel bg-opacity-20 p-4">
        
        <!-- Table Header (CSS Grid) -->
        <div class="grid grid-cols-[70px_70px_1fr_100px_160px] px-6 py-3 border-b border-white/10 text-xs font-bold uppercase tracking-wider text-slate-400 font-heading">
          <div class="text-center">RANK</div>
          <div class="text-center">AVATAR</div>
          <div>PLAYER</div>
          <div class="text-center">LEVEL</div>
          <div class="text-right">SCORE</div>
        </div>
        
        <!-- Table rows container -->
        <div class="flex-1 overflow-hidden flex flex-col justify-between py-2" id="rows-container">
          <!-- Dynamically populated rows (max 10) -->
        </div>
      </div>
      
    </div>

    <!-- Footer Area -->
    <div class="flex justify-between items-center text-xs text-slate-500 mt-4 relative z-10 border-t border-white/5 pt-3 font-mono">
      <div id="last-updated">Last Updated: Just Now</div>
      <div id="page-number">Page 1 of 1</div>
    </div>
    
  </div>

  <script src="script.js"></script>
</body>
</html>
